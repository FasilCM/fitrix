<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fitrix</title>
</head>
<body>

<h2>Fitrix Reminder System Running ✅</h2>
<p>Keep this tab open for reminders.</p>

<script>

// SETTINGS
const waterInterval = 2 * 60 * 60 * 1000; // 2 hours
const workoutTime = "18:00"; // 6 PM
const sleepTime = "22:30"; // 10:30 PM

// SOUND
function playSound() {
  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}

// REMINDER
function showReminder(message) {
  alert(message);
  playSound();
}

// WATER REMINDER
setInterval(() => {
  showReminder("💧 Time to drink water!");
}, waterInterval);

// TIME CHECK
function checkTimeReminder() {
  const now = new Date();
  const currentTime = now.toTimeString().slice(0,5);

  if (currentTime === workoutTime) {
    showReminder("🏋️ Time for workout!");
  }

  if (currentTime === sleepTime) {
    showReminder("😴 Time to sleep!");
  }
}

setInterval(checkTimeReminder, 60000);

</script>

</body>
</html>
