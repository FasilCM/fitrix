<script>

// TEST MODE (fast)
const waterInterval = 5000; // 5 seconds
const workoutTime = new Date().toTimeString().slice(0,5); // NOW
const sleepTime = workoutTime;

// SOUND
function playSound() {
  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}

// REMINDER
function showReminder(message) {
  alert(message);
  playSound();
}

// WATER
setInterval(() => {
  showReminder("💧 Drink Water!");
}, waterInterval);

// TIME CHECK
function checkTimeReminder() {
  const now = new Date();
  const currentTime = now.toTimeString().slice(0,5);

  if (currentTime === workoutTime) {
    showReminder("🏋️ Workout Time!");
  }

  if (currentTime === sleepTime) {
    showReminder("😴 Sleep Time!");
  }
}

setInterval(checkTimeReminder, 10000);

</script>
